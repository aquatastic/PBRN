<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>paint ball run</title>
<link rel="icon" type="image/png" href="favicon.png">
  <style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;}
  canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const c=document.getElementById("game"),x=c.getContext("2d");
function rs(){c.width=innerWidth;c.height=innerHeight;}rs();onresize=rs;
let k={};document.onkeydown=e=>{k[e.key]=1};document.onkeyup=e=>{k[e.key]=0};

let theme="dark";
let state="themeSelect";

function textColor(){return (theme==="light"?"#000":"#fff");}

/* ================= THEME SELECT ================= */
let themeSel=0;
function updateThemeSelect(){
  if(k["ArrowUp"]||k["ArrowLeft"]){themeSel=0;k["ArrowUp"]=k["ArrowLeft"]=0;}
  if(k["ArrowDown"]||k["ArrowRight"]){themeSel=1;k["ArrowDown"]=k["ArrowRight"]=0;}
  if(k["Enter"]){
    theme=(themeSel===0?"light":"dark");
    state="intro";
    initIntro();
    k["Enter"]=0;
  }
}
function drawThemeSelect(){
  x.fillStyle="#000";x.fillRect(0,0,c.width,c.height);
  x.fillStyle="#0ff";x.font="48px Arial Black";
  x.fillText("CHOOSE YOUR THEME",c.width/2-260,150);
  x.font="32px Arial";
  x.fillStyle=(themeSel===0?"#ff0":"#fff");
  x.fillText("LIGHT MODE",c.width/2-120,260);
  x.fillStyle=(themeSel===1?"#ff0":"#fff");
  x.fillText("DARK MODE",c.width/2-120,320);
  x.fillStyle="#aaa";x.font="20px Arial";
  x.fillText("Use ↑/↓ or ←/→ to choose, ENTER to confirm.",c.width/2-220,420);
}

/* ================= RIPPLE INTRO ================= */
let introT=0,rippleTime=0;
function initIntro(){introT=0;rippleTime=0;}

function drawIntro(){
  introT++;

  rippleTime+=0.03;
  let img=x.createImageData(c.width,c.height),d=img.data;
  for(let y=0;y<c.height;y++){
    for(let i=0;i<c.width;i++){
      let dx=i-c.width/2,dy=y-c.height/2;
      let dist=Math.sqrt(dx*dx+dy*dy);
      let wave=Math.sin(dist*0.03 - rippleTime*4)*12;
      let shade=180+wave;
      let idx=(y*c.width+i)*4;
      d[idx]=shade;d[idx+1]=shade;d[idx+2]=shade;d[idx+3]=255;
    }
  }
  x.putImageData(img,0,0);

  x.font="90px Arial Black";
  x.fillStyle="rgb(0,140,255)";
  x.fillText("AQUATASTIC",c.width/2-260,c.height/2);

  if(introT>90) state="menu";
}

/* ================= PLAYER & GLOBALS ================= */
let p={x:100,y:100,vx:0,vy:0,r:20,col:"grey",g:false,jc:0};
let grav=.6,spd=4,jmp=13;
let shield=false,shieldT=0,shieldUsed=false;
let cam=0;
let abilityUses=0,maxAbilityUses=2;
let coins=0;

/* ================= HATS ONLY ================= */
let allHats=[
  {name:"Golden Crown"},
  {name:"Blue Baseball Cap"},
  {name:"Wizard Hat"},
  {name:"Red Beanie"},
  {name:"Spiky Helmet"},
  {name:"Star Tiara"},
  {name:"Bucket Hat"},
  {name:"Top Hat"},
  {name:"Leaf Wreath"},
  {name:"Cyber Visor"}
];

let ownedHats=[0];
let equippedHatIndex=0;
let lockerHatCursor=0;

/* ================= CHEAT CODE ================= */
let cheatBuffer = "";
document.addEventListener("keydown", e=>{
  cheatBuffer += e.key.toLowerCase();
  if(cheatBuffer.length > 20) cheatBuffer = cheatBuffer.slice(-20);

  if(cheatBuffer.includes("aquatastic")){
    ownedHats = allHats.map((_,i)=>i);
    alert("CHEAT ACTIVATED! All hats unlocked!");
    cheatBuffer = "";
  }
});

/* ================= LEVELS ================= */
let lvl=null,idx=0;const GH=50;

function genLvl(d){
  let by=500+d*20,len=2200+d*400;
  let P=[{x:0,y:by,w:len,h:GH}],S=[],C=[];
  let X=300,Y=by-80,extra=3+d;

  for(let i=0;i<extra;i++){
    X+=220+Math.random()*80;
    Y+=-60+Math.random()*120;
    Y=Math.max(by-200,Math.min(by-40,Y));
    P.push({x:X,y:Y,w:180,h:20});
  }

  let sp=2+d*2;
  for(let i=0;i<sp;i++){
    let sx=400+Math.random()*(len-600);
    S.push({x:sx,y:by-30,w:40,h:30});
  }

  C.push({x:P[1].x+40,y:P[1].y-20,r:15,col:"red",got:false});
  C.push({x:P[2].x+40,y:P[2].y-20,r:15,col:"blue",got:false});
  C.push({x:len-400,y:by-40,r:15,col:"green",got:false});

  let door={x:len-200,y:by-60,w:80,h:60,col:"green"};

  return{P,S,C,door};
}

function resetP(){
  p.x=100;p.y=100;p.vx=0;p.vy=0;p.col="grey";p.jc=0;
  shield=false;shieldT=0;shieldUsed=false;
  if(lvl)lvl.C.forEach(o=>o.got=false);
}

/* ================= ABILITIES ================= */
function abilities(){
  if(shield){shieldT--;if(shieldT<=0)shield=false;}
  if(abilityUses>=maxAbilityUses)return;

  if(k["e"]||k["E"]){
    if(p.col==="red"&&!shieldUsed){
      shield=true;shieldT=60*5;shieldUsed=true;abilityUses++;
      k["e"]=k["E"]=0;
    }
    else if(p.col==="blue"){
      coins+=10;abilityUses++;k["e"]=k["E"]=0;
    }
  }
}

/* ================= MOVEMENT ================= */
function movePlayer(platforms,spikes,pickups,door,onComplete){
  p.vx=0;
  if(k["a"]||k["ArrowLeft"])p.vx=-spd;
  if(k["d"]||k["ArrowRight"])p.vx=spd;

  let mj=(p.col=="grey")?2:1;
  if(k["w"]||k["ArrowUp"]){
    if(p.g){p.vy=-jmp;p.g=false;p.jc=1;}
    else if(p.jc<mj){p.vy=-jmp;p.jc++;}
  }

  p.vy+=grav;p.x+=p.vx;p.y+=p.vy;p.g=false;

  platforms.forEach(P=>{
    if(p.x+p.r>P.x&&p.x-p.r<P.x+P.w&&p.y+p.r>P.y&&p.y+p.r<P.y+P.h&&p.vy>=0){
      p.y=P.y-p.r;p.vy=0;p.g=true;p.jc=0;
    }
  });

  spikes.forEach(s=>{
    if(p.x+p.r>s.x&&p.x-p.r<s.x+s.w&&p.y+p.r>s.y&&p.y-p.r<s.y+s.h){
      if(!shield)resetP();
    }
  });

  pickups.forEach(o=>{
    if(o.got)return;
    let dx=p.x-o.x,dy=p.y-o.y,dist=Math.hypot(dx,dy);
    if(dist<p.r+o.r){
      if(p.col==o.col&&!shield)resetP();
      else{
        o.got=true;p.col=o.col;shield=false;shieldUsed=false;p.jc=0;
      }
    }
  });

  if(p.col==door.col){
    if(p.x+p.r>door.x&&p.x-p.r<door.x+door.w&&p.y+p.r>door.y&&p.y-p.r<door.y+door.h){
      onComplete();
    }
  }

  if(p.y>c.height+200&&!shield)resetP();
}

/* ================= MENU / SHOP ================= */
let menuSel=0;

function updateMenu(){
  if(k["ArrowUp"]){menuSel=(menuSel+5)%6;k["ArrowUp"]=0;}
  if(k["ArrowDown"]){menuSel=(menuSel+1)%6;k["ArrowDown"]=0;}

  if(k["Enter"]){
    if(menuSel==0){state="tutorial";resetP();abilityUses=0;idx=0;lvl=genLvl(idx);}
    if(menuSel==1)state="shop";
    if(menuSel==2)state="locker";
    if(menuSel==3){state="endless";startEndless();}
    if(menuSel==4){window.open("https://aquatastic.github.io/AquaHub/", "_blank");}
    if(menuSel==5)alert("are ya ragequittin or are you jst gnna go👌");
    k["Enter"]=0;
  }
}

function drawMenu(){
  x.fillStyle=(theme==="light"?"#e0f7ff":"#111");
  x.fillRect(0,0,c.width,c.height);

  x.fillStyle="#0ff";
  x.font="60px Arial Black";
  x.fillText("paint ball run",c.width/2-280,150);

  let opts=[
    "START A BIZARRE GAME",
    "SHOP",
    "LOCKER",
    "ENDLESS MODE",
    "AQUAHUB",
    "QUIT"
  ];

  x.font="32px Arial";

  for(let i=0;i<opts.length;i++){
    x.fillStyle=i==menuSel?"#ff0":textColor();
    x.fillText(opts[i],c.width/2-120,260+i*60);
  }

  x.fillStyle=textColor();
  x.font="20px Arial";
  x.fillText("Coins: "+coins,20,40);
  x.fillText("Use ↑/↓ and Enter to navigate.",20,70);
}

function updateShop(){
  if(k["Enter"]){
    if(coins>=60){
      coins-=60;
      let idx=Math.floor(Math.random()*allHats.length);
      if(!ownedHats.includes(idx))ownedHats.push(idx);
      alert("You got hat: "+allHats[idx].name+"!");
    }
    k["Enter"]=0;
  }
  if(k["Escape"]){state="menu";k["Escape"]=0;}
}

function drawShop(){
  x.fillStyle=(theme==="light"?"#e0f7ff":"#000");
  x.fillRect(0,0,c.width,c.height);

  x.fillStyle="#0f0";
  x.font="40px Arial Black";
  x.fillText("GACHA SHOP",c.width/2-140,80);

  x.font="24px Arial";
  x.fillStyle=textColor();
  x.fillText("Roll Cost: 60 coins",c.width/2-110,140);
  x.fillText("Press ENTER to roll for a random hat.",c.width/2-260,180);
  x.fillText("Press ESC to return to menu.",c.width/2-200,220);

  x.font="20px Arial";
  x.fillText("Coins: "+coins,20,40);
}
/* ================= TEXT WRAP ================= */
function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  let words = text.split(" ");
  let line = "";

  for(let n = 0; n < words.length; n++){
    let testLine = line + words[n] + " ";
    let metrics = ctx.measureText(testLine);
    let testWidth = metrics.width;

    if(testWidth > maxWidth && n > 0){
      ctx.fillText(line, x, y);
      line = words[n] + " ";
      y += lineHeight;
    } else {
      line = testLine;
    }
  }

  ctx.fillText(line, x, y);
}

/* ================= LOCKER ================= */
function updateLocker(){
  if(k["Enter"]===1) k["Enter"]=2;

  if(k["ArrowUp"]){
    lockerHatCursor=(lockerHatCursor+ownedHats.length-1)%ownedHats.length;
    k["ArrowUp"]=0;
  }

  if(k["ArrowDown"]){
    lockerHatCursor=(lockerHatCursor+1)%ownedHats.length;
    k["ArrowDown"]=0;
  }

  if(k["Enter"]){
    equippedHatIndex=lockerHatCursor;
    k["Enter"]=0;
  }

  if(k["Escape"]){state="menu";k["Escape"]=0;}
}

function drawLocker(){
  x.fillStyle=(theme==="light"?"#e0f7ff":"#000");
  x.fillRect(0,0,c.width,c.height);

  x.fillStyle="#0ff";
  x.font="40px Arial Black";
  x.fillText("LOCKER",c.width/2-80,80);

  let cx=c.width/2-250,cy=260,cr=60;

  x.beginPath();
  x.arc(cx,cy,cr,0,7);
  x.fillStyle="grey";
  x.fill();
  x.strokeStyle="#000";
  x.stroke();

  drawHat(cx,cy,cr);

  x.font="24px Arial";
  x.fillStyle=textColor();
  x.fillText("Hats",c.width/2+60,140);

  x.font="20px Arial";
  x.fillStyle=textColor();
  x.fillText("Owned Hats:",c.width/2+200,190);

  for(let i=0;i<ownedHats.length;i++){
    let idx=ownedHats[i];
    x.fillStyle=i==lockerHatCursor?"#ff0":textColor();
    x.fillText(allHats[idx].name,c.width/2+200,220+i*24);
  }

  x.fillStyle=textColor();
  x.font="18px Arial";
  x.fillText("Use ↑/↓ to select, Enter to equip, Esc to exit.",c.width/2-320,520);
  x.fillText("Coins: "+coins,20,40);
}

/* ================= TUTORIAL ================= */
function updateTutorial(){
  if(k["Enter"]){state="game";k["Enter"]=0;}
}

function drawTutorial(){
  x.fillStyle=(theme==="light"?"#e0f7ff":"#000");
  x.fillRect(0,0,c.width,c.height);

  x.fillStyle="#0ff";
  x.font="40px Arial Black";
  x.fillText("TUTORIAL",c.width/2-100,80);

  x.fillStyle=textColor();
  x.font="22px Arial";

  let left=[
    "MENU CONTROLS:",
    "- Use UP/DOWN arrows to move.",
    "- Press ENTER to select.",
    "- SHOP: Gacha rolls (60 coins).",
    "- LOCKER: Equip hats.",
    "",
    "GAME CONTROLS:",
    "- A / Left Arrow: Move left",
    "- D / Right Arrow: Move right",
    "- W / Up Arrow: Jump (Grey double jumps!)",
    "- E: Use ability",
    "",
    "ABILITIES:",
    "- Each ability can be used TWICE per level.",
    "- Dying does NOT reset uses.",
    "- Beating a level resets uses."
  ];

  let right=[
    "COSMETICS:",
    "- Only hats exist now.",
    "- Hats are always visible.",
    "",
    "BOSS FIGHT:",
    "- Dodge falling eyeball meteors.",
    "- Boss floats and looks at you.",
    "- Survive to win.",
    "- If hit: lose coins + restart.",
    "",
    "Press ENTER to begin!"
  ];

  let lx=c.width*0.1,rx=c.width*0.55,y=150,max=c.width*0.35;

  for(let t of left){wrapText(x,t,lx,y,max,28);y+=40;}
  y=150;
  for(let t of right){wrapText(x,t,rx,y,max,28);y+=40;}
}

/* ================= ENDLESS MODE ================= */
let endlessLevel = 0;

function startEndless(){
  endlessLevel = 0;
  lvl = genLvl(endlessLevel);
  resetP();
}

function updateEndless(){
  abilities();
  movePlayer(lvl.P,lvl.S,lvl.C,lvl.door,()=>{
    endlessLevel++;
    coins += 5;
    lvl = genLvl(endlessLevel);
    resetP();
  });

  if(k["Escape"]){
    state="menu";
    k["Escape"]=0;
    return;
  }

  if(k["Enter"]){
    state="menu";
    k["Enter"]=0;
    return;
  }

  cam = p.x - c.width/2;
  if(cam < 0) cam = 0;
}

function drawEndless(){
  x.fillStyle=(theme==="light"?"#e0f7ff":"#111");
  x.fillRect(0,0,c.width,c.height);

  x.save();
  x.translate(-cam,0);

  x.fillStyle=(theme==="light"?"#aaa":"#444");
  lvl.P.forEach(P=>x.fillRect(P.x,P.y,P.w,P.h));

  x.fillStyle="#cc0000";
  lvl.S.forEach(s=>{
    x.beginPath();
    x.moveTo(s.x,s.y+s.h);
    x.lineTo(s.x+s.w/2,s.y);
    x.lineTo(s.x+s.w,s.y+s.h);
    x.fill();
  });

  lvl.C.forEach(o=>{
    if(!o.got){
      x.beginPath();
      x.arc(o.x,o.y,o.r,0,7);
      x.fillStyle=o.col;
      x.fill();
    }
  });

  let d=lvl.door;
  x.fillStyle=d.col;
  x.fillRect(d.x,d.y,d.w,d.h);

  drawPlayer();
  x.restore();

  x.fillStyle=textColor();
  x.font="20px Arial";
  x.fillText("ENDLESS MODE — Level: "+(endlessLevel+1),20,40);
  x.fillText("Coins: "+coins,20,70);
}

/* ================= BOSS ================= */
let boss={x:1200,y:250,r:80},bossTimer=1200,meteors=[];

function initBoss(){
  resetP();abilityUses=0;
  p.x=300;p.y=400;p.col="grey";
  bossTimer=1200;meteors=[];
  boss.x=c.width/2+200;boss.y=250;
}

function spawnMeteor(){
  meteors.push({x:Math.random()*c.width,y:-50,r:25,vy:6+Math.random()*4});
}

function updateBoss(){
  boss.x=c.width/2+200+Math.sin(Date.now()/700)*80;
  boss.y=250+Math.sin(Date.now()/900)*40;

  p.vx=0;
  if(k["a"]||k["ArrowLeft"])p.vx=-spd;
  if(k["d"]||k["ArrowRight"])p.vx=spd;

  let mj=(p.col=="grey")?2:1;
  if(k["w"]||k["ArrowUp"]){
    if(p.g){p.vy=-jmp;p.g=false;p.jc=1;}
    else if(p.jc<mj){p.vy=-jmp;p.jc++;}
  }

  p.vy+=grav;p.x+=p.vx;p.y+=p.vy;p.g=false;

  if(p.y+p.r>550){
    p.y=550-p.r;p.vy=0;p.g=true;p.jc=0;
  }

  if(Math.random()<0.08)spawnMeteor();
  meteors.forEach(m=>m.y+=m.vy);

  for(let m of meteors){
    let dx=p.x-m.x,dy=p.y-m.y;
    if(Math.hypot(dx,dy)<p.r+m.r){
      coins=Math.max(0,coins-5);
      initBoss();
      return;
    }
  }

  bossTimer--;
  if(bossTimer<=0){
    coins+=15;
    state="menu";
    idx=0;
    lvl=null;
    resetP();
    abilityUses=0;
  }
}

function drawBoss(){
  x.fillStyle=(theme==="light"?"#e0f7ff":"#000");
  x.fillRect(0,0,c.width,c.height);

  x.fillStyle=textColor();
  x.font="28px Arial Black";
  x.fillText("SURVIVE THE METEOR STORM!",c.width/2-250,80);

  x.font="22px Arial";
  x.fillText("Time Left: "+Math.ceil(bossTimer/60),20,40);
  x.fillText("Coins: "+coins,20,70);

  x.beginPath();
  x.arc(boss.x,boss.y,boss.r,0,7);
  x.fillStyle="#8800ff";
  x.fill();

  let dx=p.x-boss.x,dy=p.y-boss.y;
  let angle=Math.atan2(dy,dx);
  let px=boss.x+Math.cos(angle)*25;
  let py=boss.y+Math.sin(angle)*25;

  x.beginPath();
  x.arc(px,py,14,0,7);
  x.fillStyle="#fff";
  x.fill();

  meteors.forEach(m=>{
    x.beginPath();
    x.arc(m.x,m.y,m.r,0,7);
    x.fillStyle="#ff4444";
    x.fill();
  });

  drawPlayer();

  x.fillStyle=textColor();
  x.font="18px Arial";
  x.fillText("Dodge the falling eyeballs!",20,520);
}

/* ================= DRAW PLAYER ================= */
function drawPlayer(){
  x.beginPath();
  x.arc(p.x,p.y,p.r,0,7);

  let base;
  if(p.col=="red" || p.col=="blue" || p.col=="green"){
    base = p.col;
  } else {
    base = "grey";
  }

  x.fillStyle=base;
  x.fill();
  x.strokeStyle="#000";
  x.stroke();

  drawHat(p.x,p.y,p.r);

  if(shield){
    x.strokeStyle="cyan";
    x.lineWidth=4;
    x.beginPath();
    x.arc(p.x,p.y,p.r+6,0,7);
    x.stroke();
    x.lineWidth=1;
  }
}

/* ================= DRAW HAT ================= */
function drawHat(px,py,r){
  let s=r/20;
  let hat=allHats[equippedHatIndex].name;

  if(hat==="Golden Crown"){
    x.fillStyle="gold";
    x.beginPath();
    x.moveTo(px-22*s,py-r+5*s);
    x.lineTo(px-10*s,py-r-25*s);
    x.lineTo(px,py-r+5*s);
    x.lineTo(px+10*s,py-r-25*s);
    x.lineTo(px+22*s,py-r+5*s);
    x.closePath();
    x.fill();
  }

  else if(hat==="Blue Baseball Cap"){
    x.fillStyle="#3399ff";
    x.fillRect(px-22*s,py-r-15*s,44*s,12*s);
    x.fillRect(px-10*s,py-r+2*s,20*s,6*s);
  }

  else if(hat==="Wizard Hat"){
    x.fillStyle="#6633cc";
    x.beginPath();
    x.moveTo(px,py-r-35*s);
    x.lineTo(px-20*s,py-r+5*s);
    x.lineTo(px+20*s,py-r+5*s);
    x.closePath();
    x.fill();
  }

  else if(hat==="Red Beanie"){
    x.fillStyle="#ff3333";
    x.beginPath();
    x.arc(px,py-r+5*s,22*s,Math.PI,0);
    x.fill();
  }

  else if(hat==="Spiky Helmet"){
    x.fillStyle="#555";
    x.fillRect(px-22*s,py-r-10*s,44*s,12*s);
    x.fillStyle="#999";
    x.beginPath();
    x.moveTo(px-15*s,py-r-10*s);
    x.lineTo(px-10*s,py-r-30*s);
    x.lineTo(px-5*s,py-r-10*s);
    x.fill();
    x.beginPath();
    x.moveTo(px+5*s,py-r-10*s);
    x.lineTo(px+10*s,py-r-30*s);
    x.lineTo(px+15*s,py-r-10*s);
    x.fill();
  }

  else if(hat==="Star Tiara"){
    x.fillStyle="gold";
    x.fillRect(px-18*s,py-r+0*s,36*s,5*s);
    x.fillStyle="yellow";
    x.beginPath();
    x.moveTo(px,py-r-20*s);
    x.lineTo(px-8*s,py-r+0*s);
    x.lineTo(px+8*s,py-r+0*s);
    x.closePath();
    x.fill();
  }

  else if(hat==="Bucket Hat"){
    x.fillStyle="#77aa77";
    x.fillRect(px-22*s,py-r-15*s,44*s,18*s);
    x.fillRect(px-30*s,py-r+3*s,60*s,6*s);
  }

  else if(hat==="Top Hat"){
    x.fillStyle="#000";
    x.fillRect(px-18*s,py-r-35*s,36*s,26*s);
    x.fillRect(px-30*s,py-r+0*s,60*s,6*s);
  }

  else if(hat==="Leaf Wreath"){
    x.fillStyle="#33aa33";
    for(let i=-20;i<=20;i+=10){
      x.beginPath();
      x.ellipse(px+i*s,py-r+5*s,8*s,14*s,Math.PI/4,0,Math.PI*2);
      x.fill();
    }
  }

  else if(hat==="Cyber Visor"){
    x.fillStyle="#00ffff";
    x.fillRect(px-22*s,py-r-8*s,44*s,8*s);
    x.fillStyle="#003333";
    x.fillRect(px-22*s,py-r+2*s,44*s,5*s);
  }
}

/* ================= UPDATE ================= */
function update(){
  if(state==="themeSelect"){updateThemeSelect();return;}
  if(state==="intro"){return;}
  if(state==="menu"){updateMenu();return;}
  if(state==="shop"){updateShop();return;}
  if(state==="locker"){updateLocker();return;}
  if(state==="tutorial"){updateTutorial();return;}
  if(state==="boss"){updateBoss();return;}
  if(state==="endless"){updateEndless();return;}

  if(
    k["Enter"] &&
    state!=="menu" &&
    state!=="intro" &&
    state!=="tutorial" &&
    state!=="shop" &&
    state!=="locker" &&
    state!=="boss"
  ){
    state="menu";k["Enter"]=0;return;
  }

  if(state==="game"){
    if(!lvl)lvl=genLvl(idx);

    abilities();

    movePlayer(lvl.P,lvl.S,lvl.C,lvl.door,()=>{
      idx++;abilityUses=0;

      if(idx==4){
        state="boss";
        initBoss();
        return;
      }

      if(idx>4){
        alert("YOU BEAT EVERYTHING!");
        idx=0;
      }

      lvl=genLvl(idx);
      resetP();
    });

    cam=p.x-c.width/2;
    if(cam<0)cam=0;
  }
}

/* ================= DRAW ================= */
function draw(){
  if(state==="themeSelect"){drawThemeSelect();return;}
  if(state==="intro"){drawIntro();return;}
  if(state==="menu"){drawMenu();return;}
  if(state==="shop"){drawShop();return;}
  if(state==="locker"){drawLocker();return;}
  if(state==="tutorial"){drawTutorial();return;}
  if(state==="boss"){drawBoss();return;}
  if(state==="endless"){drawEndless();return;}

  if(state==="game"){
    x.fillStyle=(theme==="light"?"#e0f7ff":"#111");
    x.fillRect(0,0,c.width,c.height);

    x.save();
    x.translate(-cam,0);

    x.fillStyle=(theme==="light"?"#aaa":"#444");
    lvl.P.forEach(P=>x.fillRect(P.x,P.y,P.w,P.h));

    x.fillStyle="#cc0000";
    lvl.S.forEach(s=>{
      x.beginPath();
      x.moveTo(s.x,s.y+s.h);
      x.lineTo(s.x+s.w/2,s.y);
      x.lineTo(s.x+s.w,s.y+s.h);
      x.fill();
    });

    lvl.C.forEach(o=>{
      if(!o.got){
        x.beginPath();
        x.arc(o.x,o.y,o.r,0,7);
        x.fillStyle=o.col;
        x.fill();
      }
    });

    let d=lvl.door;
    x.fillStyle=d.col;
    x.fillRect(d.x,d.y,d.w,d.h);

    drawPlayer();
    x.restore();

    x.fillStyle=textColor();
    x.font="16px Arial";
    x.fillText("Move: A/D | Jump: W | Ability: E",20,30);
    x.fillText("Color: "+p.col+" | Level: "+(idx+1)+" | Coins: "+coins+" | Ability uses: "+abilityUses+"/"+maxAbilityUses,20,50);
  }
}

/* ================= LOOP ================= */
function loop(){update();draw();requestAnimationFrame(loop);}
loop();

</script>
